<!DOCTYPE html>
<html lang="en">
 <head>
    <meta charset="UTF-8">
    <title>Survey Form</title>
</head>
<body>
    <header>
        <h1><strong>Survey Form</strong></h1>
        <p>Please fill out this short survey form to provide feedback about our webpage.</p>
    </header>
    <section id="surveyform">
        <form action="submit_form.php" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br><br>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>
            
            <label for="confirmEmail">Confirm Email:</label>
            <input type="email" id="confirmEmail" name="confirmEmail" required><br><br>

            <label for="feedback">Please write your questions/comments below</label><br>
            <textarea id="feedback" name="feedback" rows="4" cols="50" required></textarea><br><br>
            
            <input type="submit" value="Submit">
        </form>
        <script>
            document.querySelector('form').addEventListener('submit', function(event) {
                var email = document.getElementById('email').value;
                var confirmEmail = document.getElementById('confirmEmail').value;
                
                if (email !== confirmEmail) {
                    alert('Email addresses do not match. Please try again.');
                }
            });    
        </script>
        <!-- I used stackoverflow and the code studio assistant for writing the javascript. I couldn't figure it out from the reading material - https://stackoverflow.com/questions/71923751/ -->
    </section>
</body>
</html>
